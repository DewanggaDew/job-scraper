    - "Web Developer"
    - "Software Engineer"
    - "Software Developer"
    - "Full Stack Developer"
    - "Frontend Developer"
    - "Backend Developer"
    - "Product Manager"
    - "IT Consultant"
    - "Product Owner"

  location_types:
    - "remote"
    - "hybrid"
    - "on-site"

  locations:
    on_site:
      - "Selangor, Malaysia"
      - "Kuala Lumpur, Malaysia"
      - "Petaling Jaya, Malaysia"
      - "Jakarta, Indonesia"
    remote:
      - "Malaysia"
      - "Indonesia"
      - "Selangor, Malaysia"
      - "Jakarta, Indonesia"

# ============================================================
#  Title Relevance Filter
#  Only keep scraped jobs whose title contains at least one of
#  these keywords (case-insensitive).  This prevents irrelevant
#  results (e.g. "High School Teacher") from polluting the DB.
# ============================================================
title_filter:
  # Titles must contain at least one of these (case-insensitive substring match)
  allowed_keywords:
    - "software"
    - "developer"
    - "engineer"
    - "engineering"
    - "frontend"
    - "front-end"
    - "front end"
    - "backend"
    - "back-end"
    - "back end"
    - "full stack"
    - "full-stack"
    - "fullstack"
    - "web developer"
    - "web engineer"
    - "devops"
    - "sre"
    - "site reliability"
    - "cloud engineer"
    - "data engineer"
    - "machine learning"
    - "ml engineer"
    - "ai engineer"
    - "product manager"
    - "product owner"
    - "scrum master"
    - "technical program"
    - "it consultant"
    - "it specialist"
    - "it analyst"
    - "it project"
    - "it manager"
    - "it applications"
    - "business analyst"
    - "systems analyst"
    - "technical consultant"
    - "tech lead"
    - "tech consultant"
    - "solutions architect"
    - "application developer"
    - "applications developer"
    - "mobile developer"
    - "android developer"
    - "ios developer"
    - "qa engineer"
    - "quality assurance"
    - "test engineer"
    - "automation engineer"
    - "security engineer"
    - "cybersecurity"
    - "network engineer"
    - "infrastructure"
    - "platform engineer"
    - "programmer"
    - "coder"

  # Titles matching any of these are always rejected (case-insensitive),
  # even if they also match an allowed keyword.
  blocked_keywords:
    - "teacher"
    - "teaching"
    - "lecturer"
    - "professor"
    - "principal"
    - "tutor"
    - "instructor"
    - "nurse"
    - "nursing"
    - "dentist"
    - "physician"
    - "pharmacist"
    - "chef"
    - "cook"
    - "driver"
    - "janitor"
    - "cleaner"
    - "security guard"
    - "receptionist"
    - "cashier"
    - "waiter"
    - "waitress"
    - "barista"

# ============================================================
#  Scoring Weights & Thresholds
# ============================================================
scoring:
  weights:
    skills: 0.40
    seniority: 0.25
    recency: 0.20
    title: 0.15

  thresholds:
    strong: 75
    decent: 50

  notify_threshold: 75     # Only email jobs at or above this score
  max_job_age_days: 30     # Jobs older than this get recency_score = 0

# ============================================================
#  Scraping Behaviour
# ============================================================
scraping:
  max_jobs_per_source: 50
  delay_between_requests:
    min_seconds: 3
    max_seconds: 8
  headless: true           # Set false to debug scrapers visually

# ============================================================
#  Notification
# ============================================================
notification:
  # Actual email is set via NOTIFY_EMAIL environment variable / GitHub Secret
  send_decent_matches: true   # Include decent matches in email (not just strong)
  max_jobs_in_email: 15

# ============================================================
#  CV Profiles
